<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script type="text/javascript">
        // High-priority suppression of third-party / cross-origin "Script error." inside sandboxed iframes.
        const suppressError = function(message, url) {
            const msgStr = String(message || '');
            const urlStr = String(url || '');
            if (
                msgStr.includes('Script error') ||
                msgStr.includes('clarity') ||
                msgStr.includes('disqus') ||
                !urlStr ||
                (urlStr.indexOf(window.location.origin) === -1 && !urlStr.startsWith('blob:'))
            ) {
                console.warn('Suppressed third-party script error:', message, 'at', url);
                return true;
            }
            return false;
        };

        window.onerror = function(message, url, line, col, error) {
            if (suppressError(message, url)) {
                return true;
            }
            return false;
        };

        window.addEventListener('error', function(event) {
            if (suppressError(event.message, event.filename)) {
                event.stopImmediatePropagation();
                event.preventDefault();
            }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
            const reason = event.reason;
            if (reason) {
                const message = reason.message || String(reason);
                if (suppressError(message, '')) {
                    event.stopImmediatePropagation();
                    event.preventDefault();
                }
            }
        }, true);
    </script>
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "xpbs1ekyrx");
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
